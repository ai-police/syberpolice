name: Run AI Police Agent

on:
  workflow_dispatch:
    inputs:
      target_text:
        description: 'チェックしたい文章を入力してください'
        required: true
        default: 'ここに文章を入れてください'

jobs:
  moderation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run AI Police Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_TEXT: ${{ github.event.inputs.target_text }}
        run: python monitor.py
